# TEMPLATE ONLY - copy to config.ini before use.
# TEMPLATE ONLY - copy to config.ini before use.
# Do not commit real config.ini or secrets to source control.
# REQUIRED: Review and update all REQUIRED values before first run.
# If config.ini is missing, the tool recreates it from this template.
# If formatting is repaired automatically, the previous file is saved as config.ini.bak.

[splunk]
# REQUIRED: Splunk management endpoint (HTTPS, usually port 8089)
host = https://your-splunk-host:8089

# REQUIRED: Allowlisted server list (semicolon-separated). First entry is used at startup.
# EXAMPLE: https://your-splunk-host:8089;https://your-secondary-splunk-host:8089
servers = https://your-splunk-host:8089

# TEMPLATE ONLY: v4 is password-only (DPAPI secret file). Token/CLI auth is not supported.
auth_mode = password

# REQUIRED: TLS certificate verification. Set false only for approved internal/self-signed deployments.
# HTTPS is still mandatory; http:// endpoints are rejected.
verify_ssl = true

# TEMPLATE ONLY: Legacy token settings are unsupported in v4:
# token_storage, token, token_ini, token_encrypted, splunk_cli_path

# TEMPLATE ONLY: Legacy plaintext password entry is ignored by v4 (do not use)
# password =

[Credentials]
# REQUIRED: Splunk service account username
username = your_splunk_username

# REQUIRED: DPAPI secret filename (created/read by tool). Keep alongside config.ini and do not commit.
secret_file = secret.dpapi

# REQUIRED: DPAPI scope (machine or user). Must match how the secret was enrolled.
dpapi_scope = machine

[Security]
# PRODUCTION NOTE: Keep production/enforced unless approved otherwise.
build_mode = production
policy_mode = enforced
allow_insecure_overrides = false

[Logging]
# OPTIONAL: Audit log verbosity and rotation
level = INFO
verbose = false
max_bytes = 10485760
backup_count = 10
# OPTIONAL: Operational runtime log (concise user-facing flow)
runtime_log_enabled = 1
runtime_log_level = INFO
runtime_log_path = Internal/logs/runtime.log
# OPTIONAL: Development/debug log (broker/REST/dispatch tracing)
# PRODUCTION NOTE: keep disabled unless actively troubleshooting.
debug_log_enabled = 0
debug_log_level = DEBUG
debug_log_path = Internal/logs/debug.log
debug_broker_enabled = 0
debug_rest_enabled = 0
debug_dispatch_enabled = 0
debug_tracebacks_enabled = 0

[runtime]
# OPTIONAL: Test-friendly runtime controls
test_mode = false
# OPTIONAL: Lightweight backend health check budget before key UI actions
backend_health_timeout_seconds = 8
# OPTIONAL: Attempt one reconnect when stale backend/session state is detected
backend_reconnect_enabled = true
# OPTIONAL: Test-only simulation hook; fail exactly one backend health check
simulate_stale_backend_once = false

[diagnostics]
# OPTIONAL: Enable focused snapshot and verification timeline diagnostics.
snapshot_probe_enabled = 0

[mergereport]
# LEGACY (TEMPLATE ONLY): file-based MergeReport monitoring (deprecated)
# PRODUCTION NOTE: ignored when [postdispatch] merge_report_* keys are present.
enabled = false
# OPTIONAL: Absolute file path if legacy mode is explicitly enabled
log_path =
timeout_seconds = 300

[dispatch]
# OPTIONAL: Active wait budget per slice before moving on.
# PRODUCTION NOTE: This does not cancel the Splunk job; it only limits active waiting.
per_slice_wait_seconds = 30
continue_on_timeout = true
timeout_result = pending
# OPTIONAL: Safety guard for long-running slices (cancels search job if exceeded).
max_slice_runtime_seconds = 120

[email]
# REQUIRED: Review acknowledgement behavior before production use.
ack_enabled = 1
# OPTIONAL: Send ACK even when slices remain pending (PARTIAL / PENDING VERIFICATION).
ack_on_pending = 0

# REQUIRED: Set recipients if ack_use_savedsearch_recipients = 0.
# Semicolon-separated list (e.g., user@example.com;team@example.com)
ack_recipients =

# OPTIONAL: Use recipients from saved searches instead of static list.
ack_use_savedsearch_recipients = 0

# OPTIONAL: Attach CSV manifest to ACK email.
ack_attach_manifest = 0

# REQUIRED: SMTP relay settings for ACK summary email
smtp_host = your-smtp-relay
smtp_port = 25
smtp_tls = 0
# OPTIONAL: Only if relay requires authentication
smtp_user =
smtp_pass =

# REQUIRED: Approved sender address
from_addr = Splunk Notification <your-approved-sender@example.com>

[postdispatch]
# CANONICAL: Use [postdispatch] merge_report_* settings for v4.
# Legacy [mergereport] is retained only for backward-reference/migration.
# Controls the end-of-batch post-dispatch verification/reconciliation phase.
# When false, normal dispatch and active per-slice status checks still run,
# but the final post-dispatch reconciliation pass is skipped.
# Production-test packages may rely on actual report receipt instead.
enabled = true
stage2_enabled = true
max_verification_duration_seconds = 300
pending_on_inconclusive = true

# MergeReport verification settings
merge_report_enabled = true
# OPTIONAL: File-based MergeReport log path (absolute full file path, not a directory).
# PRODUCTION NOTE: Windows example -> C:\Program Files\Splunk\var\log\splunk\mergeReport_alert.log
merge_report_log_path =
merge_report_index = _internal
merge_report_source_contains = mergeReport_alert.log
merge_report_sourcetype =
merge_report_timeout_seconds = 300

# Native Splunk email action verification settings
native_email_enabled = true
native_email_index = _internal
native_email_source_contains = python.log
native_email_sourcetype =
native_email_timeout_seconds = 300

# Broker timeout for slower local broker requests
broker_request_timeout_seconds = 300

# Run one bounded reconciliation pass after all slices are attempted
reconcile_pending = true
reconcile_wait_seconds = 60

# Native email strictness: if false (default), success = invoked + no error
# if true, requires explicit success marker in logs (else remains PENDING)
native_email_strict_success = false

# Polling parameters
poll_seconds = 5
lookback_seconds = 900
