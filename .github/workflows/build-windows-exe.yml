name: Build Windows EXE (PyInstaller)

on:
  workflow_dispatch:
  push:
    branches:
      - portable-env
      - main

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnostics (prove spec content)
        shell: pwsh
        run: |
          Write-Host "HEAD:"; git rev-parse HEAD
          Write-Host "Check __file__ in spec:"
          Select-String -Path .\SplunkUtilityTool_v3.spec -Pattern "__file__" -Quiet | ForEach-Object { $_ }
          if (Select-String -Path .\SplunkUtilityTool_v3.spec -Pattern "__file__" -Quiet) {
            Write-Host "FOUND __file__ in spec (bad)"
          } else {
            Write-Host "No __file__ in spec (good)"
          }
          if (Test-Path vc_runtime) {
            Write-Host "vc_runtime folder contents:"
            Get-ChildItem vc_runtime -Force | Select-Object Name,Length | Format-Table -AutoSize
          }

      - name: Build (PyInstaller spec)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean SplunkUtilityTool_v3.spec

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force out | Out-Null
          $zip = "out\SplunkUtilityTool_${{ github.sha }}.zip"
          Compress-Archive -Path "dist\*" -DestinationPath $zip -Force
          Get-ChildItem out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SplunkUtilityTool_${{ github.sha }}
          path: out\*.zip
