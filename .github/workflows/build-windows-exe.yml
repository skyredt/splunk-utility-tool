name: Build Windows EXE (PyInstaller)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/tag/commit to build (leave blank = default branch)"
        required: false
        default: ""
  push:
    branches:
      - portable-env
      - main

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout (dispatch ref override)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.ref != '' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Checkout (dispatch default)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.ref == '' }}
        uses: actions/checkout@v4

      - name: Checkout (push/default)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnostics (vcruntime)
        shell: pwsh
        run: |
          @'
          import os
          import sys
          from pathlib import Path
          print("sys.executable:", sys.executable)
          print("sys.base_prefix:", sys.base_prefix)
          repo_root = Path.cwd()
          vc_dir = repo_root / "vc_runtime"
          if vc_dir.exists():
              print("vc_runtime contents:")
              for p in sorted(vc_dir.iterdir()):
                  print(" -", p.name)
              try:
                  os.add_dll_directory(str(vc_dir))
                  print("vc_runtime added to DLL search path")
              except (AttributeError, OSError) as exc:
                  print("vc_runtime not added to DLL search path:", exc)
          else:
              print("vc_runtime directory not found")
          roots = [
              vc_dir,
              Path(sys.base_prefix),
              Path(sys.base_prefix) / "DLLs",
              Path(sys.executable).resolve().parent,
              Path("C:/Windows/System32"),
              Path("C:/Windows/SysWOW64"),
          ]
          patterns = ("vcruntime140*.dll", "msvcp140*.dll")
          found = []
          for root in roots:
              if not root.exists():
                  continue
              for pattern in patterns:
                  found.extend([str(p) for p in root.glob(pattern)])
          if found:
              print("Found VC runtime DLLs:")
              for p in sorted(set(found)):
                  print(" -", p)
          else:
              print("Found VC runtime DLLs: none")
          '@ | python -

      - name: Build (PyInstaller spec)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean SplunkUtilityTool_v3.spec

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force out | Out-Null
          $src = "dist"
          $zip = "out\SplunkUtilityTool_${{ github.sha }}.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $zip -Force
          Get-ChildItem out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SplunkUtilityTool_${{ github.sha }}
          path: out\*.zip
