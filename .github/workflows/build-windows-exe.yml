name: Build Windows EXE (PyInstaller)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/tag/commit to build (leave blank = default branch)"
        required: false
        default: ""
  push:
    branches:
      - portable-env
      - main

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build (PyInstaller spec)
        shell: pwsh
        run: |
          # Pick ONE spec file name you want to build. Adjust if needed.
          pyinstaller --noconfirm --clean SplunkUtilityTool_v3.spec

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force out | Out-Null
          $src = "dist"
          $zip = "out\SplunkUtilityTool_${{ github.sha }}.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $zip -Force
          Get-ChildItem out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SplunkUtilityTool_${{ github.sha }}
          path: out\*.zip
