name: Build Windows EXE (PyInstaller)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/tag/commit to build (leave blank = default branch)"
        required: false
        default: ""
  push:
    branches:
      - portable-env
      - main

jobs:
  build:
    runs-on: windows-2022

    steps:
      # If workflow_dispatch and ref is provided, checkout that ref
      - name: Checkout (workflow_dispatch with ref)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.ref != '' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      # If workflow_dispatch and ref is blank, checkout default branch for that run context
      - name: Checkout (workflow_dispatch default)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.ref == '' }}
        uses: actions/checkout@v4

      # If push event, checkout pushed commit
      - name: Checkout (push)
        if: ${{ github.event_name == 'push' }}
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnostics (VC runtime + vc_runtime folder)
        shell: pwsh
        run: |
          python -c "import sys; print('sys.executable:', sys.executable); print('sys.base_prefix:', sys.base_prefix)"
          if (Test-Path vc_runtime) {
            Write-Host "vc_runtime folder exists. Contents:"
            Get-ChildItem vc_runtime -Force | Format-Table Name,Length
          } else {
            Write-Host "vc_runtime folder does NOT exist in repo checkout."
          }
          Write-Host "System32 VC runtime candidates:"
          Get-ChildItem C:\Windows\System32 -Filter "vcruntime140*.dll" -ErrorAction SilentlyContinue | Select-Object Name,Length
          Get-ChildItem C:\Windows\System32 -Filter "msvcp140*.dll" -ErrorAction SilentlyContinue | Select-Object Name,Length
          Get-ChildItem C:\Windows\System32 -Filter "concrt140*.dll" -ErrorAction SilentlyContinue | Select-Object Name,Length

      - name: Build (PyInstaller spec)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean SplunkUtilityTool_v3.spec

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force out | Out-Null
          $zip = "out\SplunkUtilityTool_${{ github.sha }}.zip"
          Compress-Archive -Path "dist\*" -DestinationPath $zip -Force
          Get-ChildItem out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SplunkUtilityTool_${{ github.sha }}
          path: out\*.zip
